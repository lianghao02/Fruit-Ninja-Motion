<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>體感水果忍者 (Fruit Ninja Motion Web) - 終極派對版</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MediaPipe 函式庫 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: white; overflow: hidden; margin: 0; padding: 0; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        #webcam-feed { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.4; filter: blur(2px) grayscale(50%); z-index: 1; transition: all 0.5s; }
        .playing-cam { opacity: 0.8 !important; filter: blur(0px) grayscale(0%) !important; }
        
        #game-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        .text-neon-blue { text-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8; color: #e0f2fe; }
        .text-neon-red { text-shadow: 0 0 10px #ef4444, 0 0 20px #ef4444; color: #fee2e2; }
        .text-neon-pink { text-shadow: 0 0 10px #ec4899, 0 0 20px #ec4899; color: #fce7f3; }
        
        #overlay-screens { position: absolute; inset: 0; z-index: 20; pointer-events: none; }
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .bg-blur { background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(10px); }
        .hidden { opacity: 0; pointer-events: none; display: none !important; }

        .btn {
            pointer-events: auto; background: rgba(255,255,255,0.1); border: 2px solid #ec4899;
            color: white; font-size: 1.5rem; font-weight: bold; padding: 1rem 3rem;
            border-radius: 9999px; text-shadow: 0 0 10px #ec4899; box-shadow: 0 0 20px rgba(236, 72, 153, 0.5);
            transition: all 0.3s; cursor: pointer;
        }
        .btn:hover { background: rgba(236, 72, 153, 0.3); transform: scale(1.05); box-shadow: 0 0 30px rgba(236, 72, 153, 0.8); }

        /* 爆裂閃爍特效與震動 */
        @keyframes flash-red {
            0% { background-color: rgba(239, 68, 68, 0.8); }
            100% { background-color: transparent; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }
        .shake-effect { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        
        /* 結算快門特效 */
        @keyframes flash-white {
            0% { background-color: rgba(255, 255, 255, 1); }
            100% { background-color: rgba(255, 255, 255, 0); }
        }
        .flash-effect { animation: flash-white 0.8s ease-out; }

        /* 拍立得照片樣式 */
        .snapshot-photo {
            transform: rotate(-3deg);
            border: 10px solid white;
            border-bottom: 40px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            max-height: 40vh;
            border-radius: 4px;
        }
        
        /* 冰凍濾鏡 */
        .ice-filter { filter: hue-rotate(180deg) saturate(150%) blur(1px) !important; transition: filter 0.3s; }
    </style>
</head>
<body>

<div id="game-container">
    <video id="webcam-feed" autoplay playsinline></video>
    <canvas id="game-canvas"></canvas>
    
    <!-- 閃光燈圖層 -->
    <div id="flashOverlay" class="absolute inset-0 z-30 pointer-events-none"></div>
</div>

<div id="overlay-screens">
    <!-- 載入畫面 -->
    <div id="loadingScreen" class="screen bg-blur">
        <div class="animate-spin rounded-full h-32 w-32 border-t-4 border-b-4 border-[#38bdf8] mb-4"></div>
        <h1 class="text-4xl font-bold text-neon-blue">啟動神經連結中...</h1>
        <p class="mt-4 text-gray-400">正在下載 MediaPipe 模型...</p>
    </div>

    <!-- 授權與開始畫面 -->
    <div id="startScreen" class="screen bg-blur hidden" style="pointer-events: auto;">
        <h1 class="text-5xl font-bold text-neon-pink mb-12">神經連結已就緒</h1>
        <button class="btn" id="btnInit">點擊這裡以開啟音效與相機</button>
    </div>

    <!-- 主選單 -->
    <div id="menuScreen" class="screen hidden" style="justify-content: flex-start; padding-top: 10vh;">
        <h1 class="text-[5rem] font-bold text-neon-pink mb-4 text-center">體感水果忍者</h1>
        <p class="text-2xl text-neon-blue mb-8 font-bold">揮舞手臂，切開下方的水果來選擇模式！</p>
    </div>

    <!-- 遊戲結束畫面 -->
    <div id="gameOverScreen" class="screen hidden" style="justify-content: flex-start; padding-top: 5vh;">
        <h1 id="gameOverTitle" class="text-[5rem] font-bold text-neon-red mb-4">系統過載</h1>
        <p id="gameOverSub" class="text-4xl text-neon-blue font-bold">最終得分: <span id="finalScore">0</span></p>
        
        <!-- 結算截圖相框 -->
        <div class="mt-6">
            <img id="snapshotImage" class="snapshot-photo hidden" alt="派對截圖">
        </div>
        
        <p class="text-2xl text-gray-300 mt-6 bg-black/50 px-6 py-2 rounded-full border border-gray-600">切開下方的水果重新啟動</p>
    </div>
</div>

<!-- 隱藏的 YouTube 播放器容器 -->
<div id="yt-container" class="hidden"></div>

<script>
// ==========================================
// ⚙️ 靜態配置 (CONFIG)
// ==========================================
const CONFIG = {
    UI: {
        COLOR_ACCENT: '#38bdf8',
        COLOR_DANGER: '#ef4444',
        FONT_FAMILY: 'Outfit, sans-serif'
    },
    GAME: {
        MAX_LIVES: 3,
        SPAWN_RATE: 1500,
        MIN_SPAWN_RATE: 600,
        BANANA_PROBABILITY: 0.08, 
        SPECIAL_PROBABILITY: 0.10, // 10% 出現魔法水果 (冰凍❄️/狂暴🐉)
        BANANA_DURATION: 300, 
        PARTY_TIME: 60,
        BGM_YOUTUBE_ID: '2PyrZdUVBb4' // Alan Walker - Spectre
    },
    TRACKING: {
        BLADE_REACH: 3.5, 
        BLADE_LIFE: 8,    
        MIN_SWIPE_DIST: 20
    },
    COLORS: {
        BLADES: ['rgba(56,189,248,', 'rgba(236,72,153,', 'rgba(34,197,94,', 'rgba(249,115,22,'],
        FRUITS: {
            '🍎': '#ff3333', '🍉': '#ff4444', '🍇': '#9933ff', '🍍': '#ffcc00', '🥝': '#66cc00',
            '💣': '#333333', '🍌': '#ffff00', '❄️': '#88ddff', '🐉': '#ff0066'
        }
    }
};

// ==========================================
// 🔊 音效合成系統 (SoundSys)
// ==========================================
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();

const SoundSys = {
    playSlash() {
        try {
            if(audioCtx.state !== 'running') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(1.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } catch(e) {}
    },
    playExplosion() {
        try {
            if(audioCtx.state !== 'running') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(2.0, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        } catch(e) {}
    },
    playSpecial() {
        try {
            if(audioCtx.state !== 'running') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(1.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        } catch(e) {}
    }
};

// ==========================================
// ✨ 特效引擎 (粒子與漂浮文字)
// ==========================================
let particles = [];
let floatingTexts = [];

function spawnParticles(x, y, emoji) {
    let baseColor = CONFIG.COLORS.FRUITS[emoji] || '#ffffff';
    for(let i = 0; i < 20; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 20,
            vy: (Math.random() - 0.5) * 20 - 5,
            life: 1.0,
            color: baseColor,
            size: Math.random() * 10 + 4
        });
    }
}

function spawnFloatingText(x, y, text, color, isCombo = false) {
    floatingTexts.push({ 
        x: x, y: y, text: text, life: 1.0, color: color, 
        size: isCombo ? 60 : 30, vy: isCombo ? -4 : -2
    });
}

function updateAndDrawEffects(ctx) {
    // 繪製粒子
    for(let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.8; // 重力
        p.life -= 0.02;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }
    
    // 繪製浮動文字
    for(let i = floatingTexts.length - 1; i >= 0; i--) {
        let t = floatingTexts[i];
        t.y += t.vy;
        t.life -= 0.02;
        if (t.life <= 0) { floatingTexts.splice(i, 1); continue; }
        
        ctx.font = `900 ${t.size}px ${CONFIG.UI.FONT_FAMILY}`;
        ctx.fillStyle = t.color;
        ctx.globalAlpha = t.life;
        ctx.textAlign = "center";
        ctx.shadowColor = t.color;
        ctx.shadowBlur = 15;
        ctx.fillText(t.text, t.x, t.y);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1.0;
    }
}

// 📷 拍照功能
function takeSnapshot() {
    let flash = document.getElementById('flashOverlay');
    flash.classList.add('flash-effect');
    setTimeout(() => flash.classList.remove('flash-effect'), 800);
    
    let snapCanvas = document.createElement('canvas');
    snapCanvas.width = videoElement.videoWidth || 1280;
    snapCanvas.height = videoElement.videoHeight || 720;
    let sCtx = snapCanvas.getContext('2d');
    
    // 鏡像翻轉
    sCtx.translate(snapCanvas.width, 0);
    sCtx.scale(-1, 1);
    sCtx.drawImage(videoElement, 0, 0, snapCanvas.width, snapCanvas.height);
    
    let img = document.getElementById('snapshotImage');
    img.src = snapCanvas.toDataURL('image/jpeg', 0.8);
    img.classList.remove('hidden');
}

// ==========================================
// 🍎 遊戲物件與 Emoji Sprite Cache
// ==========================================
const EmojiCache = {};
function getEmojiSprite(emoji, size = 60) {
    const key = `${emoji}_${size}`;
    if (EmojiCache[key]) return EmojiCache[key];
    
    const canvas = document.createElement('canvas');
    canvas.width = size * 1.5;
    canvas.height = size * 1.5;
    const ctx = canvas.getContext('2d');
    ctx.font = `${size}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, canvas.width/2, canvas.height/2);
    
    EmojiCache[key] = { canvas, width: canvas.width, height: canvas.height };
    return EmojiCache[key];
}

class Fruit {
    constructor(canvasWidth, canvasHeight, isSpecial = false, isFrenzy = false) {
        this.radius = 40;
        const types = ['🍎', '🍉', '🍇', '🍍', '🥝'];
        
        this.emoji = types[Math.floor(Math.random() * types.length)];
        this.isBomb = false;
        this.isBanana = false;
        this.isIce = false;
        this.isDragon = false;
        
        let rand = Math.random();
        
        // 模式分配
        if (GameEngine.state === 'PLAYING' && GameEngine.mode === 'SINGLE') {
            if (rand < 0.15 && !isSpecial) this.isBomb = true;
            else if (rand < 0.15 + CONFIG.GAME.BANANA_PROBABILITY && !isSpecial) this.isBanana = true;
            else if (rand > 0.95 && !isSpecial) this.isIce = true; // 冰凍
            else if (rand > 0.90 && !isSpecial) this.isDragon = true; // 狂暴
        }
        
        if (this.isBomb) this.emoji = '💣';
        if (this.isBanana) this.emoji = '🍌';
        if (this.isIce) this.emoji = '❄️';
        if (this.isDragon) this.emoji = '🐉';

        if (isFrenzy) {
            // 狂暴模式：從兩側射出
            let fromLeft = Math.random() > 0.5;
            this.x = fromLeft ? -50 : canvasWidth + 50;
            this.y = canvasHeight * 0.3 + Math.random() * (canvasHeight * 0.4);
            this.vx = fromLeft ? (15 + Math.random()*10) : -(15 + Math.random()*10);
            this.vy = -(10 + Math.random() * 15);
        } else {
            // 正常向上拋
            this.x = canvasWidth * 0.2 + Math.random() * (canvasWidth * 0.6);
            this.y = canvasHeight + this.radius;
            this.vx = (Math.random() - 0.5) * 8;
            this.vy = -(22 + Math.random() * 8);
        }
        
        this.rotation = 0;
        this.vRot = (Math.random() - 0.5) * 0.2;
        this.cut = false;
        this.cutFrames = 0;
    }

    update(iceFactor) {
        this.x += this.vx * iceFactor;
        this.y += this.vy * iceFactor;
        this.vy += 0.5 * iceFactor; // 重力
        this.rotation += this.vRot * iceFactor;
        if (this.cut) this.cutFrames++;
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        
        const sprite = getEmojiSprite(this.emoji, this.isBomb ? 70 : 60);
        
        if (this.cut) {
            const split = this.cutFrames * 2;
            // 左半
            ctx.drawImage(sprite.canvas, 0, 0, sprite.width/2, sprite.height, 
                          -sprite.width/2 - split, -sprite.height/2, sprite.width/2, sprite.height);
            // 右半
            ctx.drawImage(sprite.canvas, sprite.width/2, 0, sprite.width/2, sprite.height, 
                          split, -sprite.height/2, sprite.width/2, sprite.height);
        } else {
            ctx.drawImage(sprite.canvas, -sprite.width/2, -sprite.height/2);
            // 特殊發光
            if(this.isIce || this.isDragon) {
                ctx.beginPath();
                ctx.arc(0, 0, 45, 0, Math.PI*2);
                ctx.strokeStyle = this.isIce ? '#aaddff' : '#ff0066';
                ctx.lineWidth = 5;
                ctx.shadowBlur = 20;
                ctx.shadowColor = ctx.strokeStyle;
                ctx.stroke();
            }
        }
        ctx.restore();
    }
}

// ==========================================
// ⚔️ 遊戲核心引擎 (GameEngine)
// ==========================================
const GameEngine = {
    state: 'INIT', // INIT, MENU, PLAYING, GAMEOVER
    mode: 'SINGLE', // SINGLE, PARTY
    score: 0,
    lives: CONFIG.GAME.MAX_LIVES,
    fruits: [],
    bladePoints: [[], [], [], []], // 支援 4 隻手的獨立軌跡
    lastSpawnTime: 0,
    currentSpawnRate: CONFIG.GAME.SPAWN_RATE,
    bananaActiveFrames: 0,
    partyTimeLeft: 0,
    partyStartTime: 0,
    
    // 魔法狀態
    iceModeFrames: 0,
    frenzyModeFrames: 0,
    
    // 選單按鈕 (虛擬物體)
    uiButtons: [],
    
    reset() {
        this.score = 0;
        this.lives = CONFIG.GAME.MAX_LIVES;
        this.fruits = [];
        this.bladePoints = [[], [], [], []];
        this.currentSpawnRate = CONFIG.GAME.SPAWN_RATE;
        this.bananaActiveFrames = 0;
        this.iceModeFrames = 0;
        this.frenzyModeFrames = 0;
        particles = [];
        floatingTexts = [];
        document.getElementById('snapshotImage').classList.add('hidden');
        document.getElementById('webcam-feed').classList.remove('ice-filter');
    },

    setMenuState() {
        this.state = 'MENU';
        this.reset();
        document.getElementById('menuScreen').classList.remove('hidden');
        document.getElementById('gameOverScreen').classList.add('hidden');
        document.getElementById('webcam-feed').classList.remove('playing-cam');
        
        let cw = canvas.width, ch = canvas.height;
        this.uiButtons = [
            { id: 'SINGLE', emoji: '🍎', x: cw/2 - 250, y: ch*0.6, r: 80, label: '單人經典' },
            { id: 'PARTY', emoji: '🍉', x: cw/2 + 250, y: ch*0.6, r: 80, label: '雙人派對' }
        ];
    },

    startGame(mode) {
        this.mode = mode;
        this.state = 'PLAYING';
        this.reset();
        
        document.getElementById('menuScreen').classList.add('hidden');
        document.getElementById('gameOverScreen').classList.add('hidden');
        document.getElementById('webcam-feed').classList.add('playing-cam');

        if (mode === 'PARTY') {
            this.partyStartTime = Date.now();
        }
    },

    endGame() {
        this.state = 'GAMEOVER';
        document.getElementById('webcam-feed').classList.remove('playing-cam');
        document.getElementById('webcam-feed').classList.remove('ice-filter');
        
        if (this.mode === 'PARTY') {
            document.getElementById('gameOverTitle').textContent = "派對時間到！";
            document.getElementById('gameOverTitle').className = "text-[5rem] font-bold text-neon-pink mb-4";
            document.getElementById('gameOverSub').innerHTML = `開心切破了 <span class="text-[#ffcc00]">${this.score}</span> 顆水果！`;
            takeSnapshot(); // 📷 結算喀嚓拍照！
        } else {
            document.getElementById('gameOverTitle').textContent = "系統過載";
            document.getElementById('gameOverTitle').className = "text-[5rem] font-bold text-neon-red mb-4";
            document.getElementById('gameOverSub').innerHTML = `最終得分: <span class="text-[#38bdf8]">${this.score}</span>`;
        }
        
        document.getElementById('gameOverScreen').classList.remove('hidden');
        
        let cw = canvas.width, ch = canvas.height;
        this.uiButtons = [
            { id: 'RESTART', emoji: '🍎', x: cw/2, y: ch*0.75, r: 70, label: '重新開始' }
        ];
    },

    processSlash(x1, y1, x2, y2, colorIdx = 0) {
        let cw = canvas.width, ch = canvas.height;
        let slashCount = 0; // Combo 計算
        let colorStr = CONFIG.COLORS.BLADES[colorIdx].replace('rgba(', '').replace(',','');
        let hexColor = '#' + colorStr.split(',').slice(0,3).map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');

        // 處理選單按鈕切割
        if (this.state === 'MENU' || this.state === 'GAMEOVER') {
            for (let i = this.uiButtons.length - 1; i >= 0; i--) {
                let btn = this.uiButtons[i];
                if (this.lineIntersectsCircle(x1, y1, x2, y2, btn.x, btn.y, btn.r)) {
                    SoundSys.playSlash();
                    spawnParticles(btn.x, btn.y, btn.emoji);
                    
                    if (this.state === 'MENU') {
                        this.startGame(btn.id);
                    } else if (this.state === 'GAMEOVER') {
                        this.setMenuState();
                    }
                    this.uiButtons.splice(i, 1);
                    return; // 切中按鈕直接返回
                }
            }
        }

        // 處理水果切割
        if (this.state === 'PLAYING') {
            for (let i = this.fruits.length - 1; i >= 0; i--) {
                let f = this.fruits[i];
                if (!f.cut && this.lineIntersectsCircle(x1, y1, x2, y2, f.x, f.y, f.radius)) {
                    f.cut = true;
                    slashCount++;
                    
                    if (f.isBomb) {
                        SoundSys.playExplosion();
                        document.body.classList.add('shake-effect');
                        setTimeout(() => document.body.classList.remove('shake-effect'), 500);
                        spawnFloatingText(f.x, f.y, "BOOM!", "#ef4444");
                        spawnParticles(f.x, f.y, '💣');
                        
                        if (this.mode === 'SINGLE') {
                            this.lives--;
                            if (this.lives <= 0) this.endGame();
                        }
                    } else {
                        SoundSys.playSlash();
                        spawnParticles(f.x, f.y, f.emoji);
                        
                        if (f.isBanana) {
                            this.bananaActiveFrames = CONFIG.GAME.BANANA_DURATION;
                            spawnFloatingText(f.x, f.y, "狂熱水果群!", "#ffff00");
                            SoundSys.playSpecial();
                        } else if (f.isIce) {
                            this.iceModeFrames = 240; // 4 秒
                            document.getElementById('webcam-feed').classList.add('ice-filter');
                            spawnFloatingText(f.x, f.y, "冰凍時刻!", "#aaddff");
                            SoundSys.playSpecial();
                        } else if (f.isDragon) {
                            this.frenzyModeFrames = 180; // 3 秒
                            spawnFloatingText(f.x, f.y, "狂暴突襲!", "#ff0066");
                            SoundSys.playSpecial();
                        } else {
                            this.score += (this.bananaActiveFrames > 0 ? 2 : 1);
                            if (this.mode === 'SINGLE' && this.score % 10 === 0 && this.currentSpawnRate > CONFIG.GAME.MIN_SPAWN_RATE) {
                                this.currentSpawnRate -= 100;
                            }
                        }
                    }
                }
            }
            
            // 🔪 Combo 結算
            if (slashCount >= 3) {
                let bonus = slashCount;
                this.score += bonus;
                let text = `Combo x${slashCount} !!`;
                spawnFloatingText(x1, y1, text, hexColor, true);
                SoundSys.playSpecial();
            }
        }
    },

    lineIntersectsCircle(x1, y1, x2, y2, cx, cy, r) {
        let dx = x2 - x1;
        let dy = y2 - y1;
        let a = dx*dx + dy*dy;
        if (a === 0) return false;
        let b = 2 * (dx*(x1 - cx) + dy*(y1 - cy));
        let c = (x1 - cx)*(x1 - cx) + (y1 - cy)*(y1 - cy) - r*r;
        let det = b*b - 4*a*c;
        if (det < 0) return false;
        
        let t1 = (-b + Math.sqrt(det)) / (2*a);
        let t2 = (-b - Math.sqrt(det)) / (2*a);
        return (0 <= t1 && t1 <= 1) || (0 <= t2 && t2 <= 1);
    },

    update(time) {
        let cw = canvas.width, ch = canvas.height;
        
        // 狀態更新
        if (this.bananaActiveFrames > 0) this.bananaActiveFrames--;
        if (this.iceModeFrames > 0) {
            this.iceModeFrames--;
            if(this.iceModeFrames <= 0) document.getElementById('webcam-feed').classList.remove('ice-filter');
        }
        if (this.frenzyModeFrames > 0) this.frenzyModeFrames--;
        
        let iceFactor = this.iceModeFrames > 0 ? 0.3 : 1.0;

        if (this.state === 'PLAYING') {
            if (this.mode === 'PARTY') {
                let elapsed = Math.floor((Date.now() - this.partyStartTime) / 1000);
                this.partyTimeLeft = Math.max(0, CONFIG.GAME.PARTY_TIME - elapsed);
                if (this.partyTimeLeft <= 0) this.endGame();
            }
            
            // 水果生成邏輯
            let effectiveSpawnRate = this.currentSpawnRate / iceFactor;
            if (this.bananaActiveFrames > 0 || this.frenzyModeFrames > 0) {
                effectiveSpawnRate = 200; // 超密集生成
            }
            
            if (time - this.lastSpawnTime > effectiveSpawnRate) {
                this.fruits.push(new Fruit(cw, ch, false, this.frenzyModeFrames > 0));
                
                // 狂熱再補一顆
                if (this.bananaActiveFrames > 0 || this.frenzyModeFrames > 0) {
                    this.fruits.push(new Fruit(cw, ch, true, this.frenzyModeFrames > 0));
                }
                
                this.lastSpawnTime = time;
            }
            
            // 更新水果與漏接判定
            for (let i = this.fruits.length - 1; i >= 0; i--) {
                let f = this.fruits[i];
                f.update(iceFactor);
                
                if (f.y > ch + 100) {
                    if (this.mode === 'SINGLE' && !f.cut && !f.isBomb && !f.isBanana && !f.isIce && !f.isDragon) {
                        this.lives--;
                        if (this.lives <= 0) this.endGame();
                    }
                    this.fruits.splice(i, 1);
                } else if (f.cutFrames > 20) {
                    this.fruits.splice(i, 1);
                }
            }
        }
    },

    drawUI(ctx) {
        let cw = canvas.width, ch = canvas.height;
        ctx.textAlign = "left";
        ctx.fillStyle = "white";
        ctx.shadowColor = "black";
        ctx.shadowBlur = 5;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;

        if (this.state === 'PLAYING') {
            if (this.mode === 'SINGLE') {
                ctx.font = "bold 40px sans-serif";
                ctx.fillText(`分數: ${this.score}`, 30, 60);
                
                ctx.font = "bold 30px sans-serif";
                let hearts = "";
                for(let i=0; i<this.lives; i++) hearts += "❤️ ";
                ctx.fillText(`生命: ${hearts}`, 30, 110);
            } else if (this.mode === 'PARTY') {
                ctx.textAlign = "center";
                ctx.font = "bold 80px sans-serif";
                ctx.fillStyle = this.partyTimeLeft <= 10 ? "#ef4444" : "#ffffff";
                
                let mins = Math.floor(this.partyTimeLeft / 60).toString().padStart(2, '0');
                let secs = (this.partyTimeLeft % 60).toString().padStart(2, '0');
                ctx.fillText(`${mins}:${secs}`, cw / 2, 90);
                
                ctx.font = "bold 40px sans-serif";
                ctx.fillStyle = "#ffcc00";
                ctx.fillText(`歡樂積分: ${this.score}`, cw / 2, 150);
            }
            
            // 魔法狀態提示
            ctx.textAlign = "right";
            ctx.font = "bold 30px sans-serif";
            if (this.bananaActiveFrames > 0) {
                ctx.fillStyle = "#ffff00";
                ctx.fillText("🍌 狂熱時刻!", cw - 30, 60);
            }
            if (this.iceModeFrames > 0) {
                ctx.fillStyle = "#aaddff";
                ctx.fillText("❄️ 冰凍時刻!", cw - 30, 100);
            }
            if (this.frenzyModeFrames > 0) {
                ctx.fillStyle = "#ff0066";
                ctx.fillText("🐉 狂暴來襲!", cw - 30, 140);
            }
        }
        
        // 繪製虛擬按鈕
        ctx.textAlign = "center";
        for (let btn of this.uiButtons) {
            ctx.beginPath();
            ctx.arc(btn.x, btn.y, btn.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fill();
            ctx.strokeStyle = CONFIG.UI.COLOR_ACCENT;
            ctx.lineWidth = 4;
            ctx.stroke();
            
            const sprite = getEmojiSprite(btn.emoji, 80);
            ctx.drawImage(sprite.canvas, btn.x - sprite.width/2, btn.y - sprite.height/2);
            
            ctx.font = "bold 30px sans-serif";
            ctx.fillStyle = "#fff";
            ctx.fillText(btn.label, btn.x, btn.y + btn.r + 35);
        }
    },

    drawBlades(ctx) {
        for (let handIdx = 0; handIdx < 4; handIdx++) {
            let pts = this.bladePoints[handIdx];
            if (pts.length < 2) continue;
            
            let colorBase = CONFIG.COLORS.BLADES[handIdx % 4];

            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) {
                ctx.lineTo(pts[i].x, pts[i].y);
            }
            
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowBlur = 20;
            ctx.shadowColor = colorBase + '1)';
            ctx.strokeStyle = colorBase + '0.8)';
            ctx.lineWidth = 8;
            ctx.stroke();

            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.stroke();
        }
    }
};

// ==========================================
// 📷 視訊與 AI 模型初始化
// ==========================================
const videoElement = document.getElementById('webcam-feed');
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({
  maxNumHands: 4, 
  modelComplexity: 1,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

hands.onResults((results) => {
    let cw = canvas.width, ch = canvas.height;
    ctx.clearRect(0, 0, cw, ch);
    
    // 渲染水果
    for (let f of GameEngine.fruits) f.draw(ctx);
    
    // 更新與繪製特效 (粒子、Combo)
    updateAndDrawEffects(ctx);

    // 處理手部軌跡與判定
    if (results.multiHandLandmarks) {
        for (let index = 0; index < results.multiHandLandmarks.length; index++) {
            const landmarks = results.multiHandLandmarks[index];
            let handIdx = index < 4 ? index : 3; 
            
            // 取手掌心
            let wrist = landmarks[0];
            let middleMcp = landmarks[9];
            
            let dx = middleMcp.x - wrist.x;
            let dy = middleMcp.y - wrist.y;
            
            let rawX = middleMcp.x + dx * CONFIG.TRACKING.BLADE_REACH;
            let rawY = middleMcp.y + dy * CONFIG.TRACKING.BLADE_REACH;
            
            let px = (1 - rawX) * cw;
            let py = rawY * ch;

            let pts = GameEngine.bladePoints[handIdx];
            
            if (pts.length > 0) {
                let lastPt = pts[pts.length - 1];
                let dist = Math.hypot(px - lastPt.x, py - lastPt.y);
                
                // 防瞬移
                if (dist > cw * 0.25) {
                    GameEngine.bladePoints[handIdx] = [];
                } else {
                    if (dist > CONFIG.TRACKING.MIN_SWIPE_DIST) {
                        GameEngine.processSlash(lastPt.x, lastPt.y, px, py, handIdx % 4);
                    }
                }
            }

            pts.push({ x: px, y: py, age: 0 });
        }
    }

    // 老化並移除舊軌跡
    for (let handIdx = 0; handIdx < 4; handIdx++) {
        let pts = GameEngine.bladePoints[handIdx];
        for (let i = pts.length - 1; i >= 0; i--) {
            pts[i].age++;
            if (pts[i].age > CONFIG.TRACKING.BLADE_LIFE) {
                pts.splice(i, 1);
            }
        }
    }

    GameEngine.drawBlades(ctx);
    GameEngine.drawUI(ctx);
});

// 主遊戲迴圈 (處理物理邏輯)
function gameLoop(time) {
    GameEngine.update(time);
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

// 初始化相機
const camera = new Camera(videoElement, {
  onFrame: async () => {
    await hands.send({image: videoElement});
  },
  width: 1280,
  height: 720
});

hands.initialize().then(() => {
    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('startScreen').classList.remove('hidden');
});

// 使用者點擊按鈕後，才開始索取相機權限與啟動音效
document.getElementById('btnInit').addEventListener('click', () => {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    
    // 【終極黑科技】強行注入 BGM
    let ytContainer = document.getElementById('yt-container');
    if (ytContainer.innerHTML === '') {
        ytContainer.innerHTML = `<iframe width="1" height="1" src="https://www.youtube.com/embed/${CONFIG.GAME.BGM_YOUTUBE_ID}?autoplay=1&loop=1&playlist=${CONFIG.GAME.BGM_YOUTUBE_ID}" frameborder="0" allow="autoplay; encrypted-media"></iframe>`;
    }
    
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('loadingScreen').classList.remove('hidden'); 
    
    camera.start().then(() => {
        GameEngine.setMenuState();
    }).catch((err) => {
        alert("請允許相機權限以進行遊戲。");
        document.getElementById('startScreen').classList.remove('hidden');
    });
});

</script>
